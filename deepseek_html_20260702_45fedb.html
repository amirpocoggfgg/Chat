<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>KHORAM Chat | پیامرسان گروهی</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Vazirmatn', sans-serif;
      background: #0f0f1a;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(20, 20, 35, 0.7);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-left: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.1);
    }
    /* پنل ورود */
    .login-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
    }
    .login-panel h2 {
      color: #fff;
      margin-bottom: 30px;
      font-size: 2rem;
      text-shadow: 0 0 20px #00d4ff;
    }
    .login-panel input {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.3s;
    }
    .login-panel input:focus {
      border-color: #00d4ff;
    }
    .btn {
      padding: 14px 30px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 12px;
      box-shadow: 0 0 20px rgba(0,212,255,0.4);
    }
    .btn:active { transform: scale(0.95); }

    /* هدر چت */
    .chat-header {
      padding: 16px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
    }
    .room-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .online-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 10px #34c759;
    }
    .leave-btn {
      background: rgba(255,59,48,0.2);
      border: 1px solid rgba(255,59,48,0.5);
      color: #ff3b30;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* ناحیه پیام‌ها */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      word-break: break-word;
      position: relative;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
    .message.me {
      align-self: flex-end;
      background: linear-gradient(135deg, #007AFF, #5AC8FA);
      border-bottom-right-radius: 4px;
    }
    .message.other {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-bottom-left-radius: 4px;
    }
    .message .sender {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 4px;
    }
    .message .text {
      color: #fff;
      font-size: 0.95rem;
    }
    .message.system {
      align-self: center;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      padding: 6px 14px;
      border-radius: 12px;
    }

    /* باکس ورودی */
    .input-area {
      display: flex;
      padding: 12px;
      gap: 10px;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .input-area input {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 0.95rem;
      outline: none;
    }
    .input-area button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00d4ff, #7b2cbf);
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0,212,255,0.5);
      transition: transform 0.2s;
    }
    .input-area button:active { transform: scale(0.9); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container" id="app">
  <!-- login panel -->
  <div class="login-panel" id="loginPanel">
    <h2>✦ KHORAM Chat ✦</h2>
    <input type="text" id="usernameInput" placeholder="اسمت رو وارد کن" maxlength="20">
    <input type="text" id="roomInput" placeholder="کد اتاق (دلخواه)" maxlength="20">
    <button class="btn" id="joinBtn">ورود به اتاق</button>
    <p style="color:rgba(255,255,255,0.5); margin-top:20px; font-size:0.8rem;">دوستانت با همین کد اتاق وارد بشن</p>
  </div>

  <!-- chat panel -->
  <div class="hidden" id="chatPanel" style="display:flex; flex-direction:column; height:100%;">
    <div class="chat-header">
      <div class="room-info">
        <span class="online-dot"></span>
        <span id="roomTitle">اتاق</span>
      </div>
      <button class="leave-btn" id="leaveBtn">خروج</button>
    </div>
    <div class="messages" id="messagesContainer"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="پیامت رو بنویس..." autocomplete="off">
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ── state ──
    let username = '';
    let roomCode = '';
    let socket = null;
    const WS_BASE = 'wss://socketsbay.com/wss/v2/';

    // ── DOM ──
    const loginPanel = document.getElementById('loginPanel');
    const chatPanel = document.getElementById('chatPanel');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const joinBtn = document.getElementById('joinBtn');
    const usernameInput = document.getElementById('usernameInput');
    const roomInput = document.getElementById('roomInput');
    const roomTitle = document.getElementById('roomTitle');

    // ── توابع کمکی ──
    function addMessage(type, content, sender = '') {
      const div = document.createElement('div');
      div.className = 'message ' + type;
      if (type === 'system') {
        div.textContent = content;
      } else {
        if (sender) {
          const senderSpan = document.createElement('div');
          senderSpan.className = 'sender';
          senderSpan.textContent = sender;
          div.appendChild(senderSpan);
        }
        const textSpan = document.createElement('div');
        textSpan.className = 'text';
        textSpan.textContent = content;
        div.appendChild(textSpan);
      }
      messagesContainer.appendChild(div);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function connectWebSocket() {
      if (socket && socket.readyState === WebSocket.OPEN) return;
      socket = new WebSocket(WS_BASE + roomCode);
      
      socket.onopen = () => {
        addMessage('system', '✅ به اتاق متصل شدی');
        // اعلام ورود
        socket.send(JSON.stringify({ type: 'join', username }));
      };

      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'join') {
            addMessage('system', `🔹 ${data.username} وارد اتاق شد`);
          } else if (data.type === 'leave') {
            addMessage('system', `🔸 ${data.username} از اتاق خارج شد`);
          } else if (data.type === 'message') {
            const isMe = data.username === username;
            addMessage(isMe ? 'me' : 'other', data.text, isMe ? '' : data.username);
          }
        } catch (e) {
          // اگر پیام متنی ساده بود
          addMessage('other', event.data, 'ناشناس');
        }
      };

      socket.onclose = () => {
        addMessage('system', '⚠️ ارتباط قطع شد. در حال تلاش مجدد...');
        setTimeout(connectWebSocket, 3000);
      };

      socket.onerror = () => {
        socket.close();
      };
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text || !socket || socket.readyState !== WebSocket.OPEN) return;
      socket.send(JSON.stringify({ type: 'message', text, username }));
      messageInput.value = '';
    }

    // ── event listeners ──
    joinBtn.addEventListener('click', () => {
      username = usernameInput.value.trim();
      roomCode = roomInput.value.trim();
      if (!username || !roomCode) {
        alert('لطفاً اسم و کد اتاق رو وارد کن');
        return;
      }
      // ذخیره در localStorage
      localStorage.setItem('khoram_chat_user', username);
      localStorage.setItem('khoram_chat_room', roomCode);
      
      loginPanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
      roomTitle.textContent = '🏠 ' + roomCode;
      connectWebSocket();
    });

    leaveBtn.addEventListener('click', () => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'leave', username }));
        socket.close();
      }
      chatPanel.classList.add('hidden');
      loginPanel.classList.remove('hidden');
      messagesContainer.innerHTML = '';
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // ── بارگذاری اطلاعات قبلی ──
    const savedUser = localStorage.getItem('khoram_chat_user');
    const savedRoom = localStorage.getItem('khoram_chat_room');
    if (savedUser && savedRoom) {
      usernameInput.value = savedUser;
      roomInput.value = savedRoom;
    }

    // ── هندل خروج با بستن صفحه ──
    window.addEventListener('beforeunload', () => {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'leave', username }));
      }
    });
  })();
</script>
</body>
</html>
